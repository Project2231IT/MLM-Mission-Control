version: "3.8"

services:
  app:
    image: guest-wifi-analytics:latest
    ports:
      - "3700:3700"
    environment:
      - NODE_ENV=production
      - PORT=3700
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=guest_wifi
      - DB_USER=guestadmin
      - DB_PASSWORD=GuestWifi2024Secure
      - SESSION_SECRET=p2231session2026
      - ADMIN_USER=admin
      - ADMIN_PASS=P2231GuestAdmin
      - RADIUS_SECRET=P2231GuestRadius2026
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=guest_wifi
      - POSTGRES_USER=guestadmin
      - POSTGRES_PASSWORD=GuestWifi2024Secure
    volumes:
      - guest_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guestadmin -d guest_wifi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  radius:
    image: freeradius/freeradius-server:latest
    volumes:
      - ./radius-config/clients.conf:/etc/freeradius/clients.conf
      - ./radius-config/authorize:/etc/freeradius/mods-config/files/authorize
      - ./radius-config/sites-enabled/default:/etc/freeradius/sites-enabled/default
      - ./radius-config/mods-enabled/sql:/etc/freeradius/mods-enabled/sql
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    dns:
      - 10.200.5.2
    networks:
      - guest-analytics_default
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "/docker-entrypoint.sh freeradius -f -l stdout; sleep infinity"]

volumes:
  guest_pgdata:

networks:
  guest-analytics_default:
    external: true
version: '3.8'

services:
  app:
    build: .
    ports:
      - "3700:3700"
    environment:
      - NODE_ENV=production
      - PORT=3700
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=guest_wifi
      - DB_USER=guestadmin
      - DB_PASSWORD=GuestWifi2024!Secure
      - SESSION_SECRET=p2231-guest-wifi-session-secret-change-me
      - ADMIN_USER=admin
      - ADMIN_PASS=P2231Guest@Admin
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=guest_wifi
      - POSTGRES_USER=guestadmin
      - POSTGRES_PASSWORD=GuestWifi2024!Secure
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guestadmin -d guest_wifi"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:

# Allow all GWN APs on 172.16.15.x subnet
client gwn_aps {
    ipaddr = 172.16.15.0/24
    secret = P2231GuestRadius2026
    shortname = gwn-aps
}

# Allow the app server itself (for testing)
client localhost {
    ipaddr = 127.0.0.1
    secret = P2231GuestRadius2026
    shortname = localhost
}

# Allow Docker network
client docker {
    ipaddr = 172.16.0.0/12
    secret = P2231GuestRadius2026
    shortname = docker
}

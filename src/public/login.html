<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest WiFi Analytics - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen flex items-center justify-center">
  <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md">
    <div class="text-center mb-8">
      <div class="text-4xl mb-2">📶</div>
      <h1 class="text-2xl font-bold text-white">Guest WiFi Analytics</h1>
      <p class="text-gray-400 mt-1">Project2231 Dashboard</p>
    </div>
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">Username</label>
        <input type="text" id="username" name="username" required
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          placeholder="admin">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-300 mb-1">Password</label>
        <input type="password" id="password" name="password" required
          class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent">
      </div>
      <div id="error" class="text-red-400 text-sm hidden"></div>
      <button type="submit"
        class="w-full py-2 px-4 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition">
        Sign In
      </button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error');
      errEl.classList.add('hidden');
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
          }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = 'Invalid credentials';
          errEl.classList.remove('hidden');
        }
      } catch (err) {
        errEl.textContent = 'Connection error';
        errEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>

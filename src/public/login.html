<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guest WiFi Analytics — Sign In</title>
  <script src="/vendor/tailwind.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, #eff6ff 0%, #f1f5f9 50%, #e0f2fe 100%);">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
    <!-- Header band -->
    <div class="bg-blue-600 px-8 py-6 text-center">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-white/20 rounded-xl mb-3">
        <span class="text-3xl">📶</span>
      </div>
      <h1 class="text-2xl font-bold text-white">Guest WiFi Analytics</h1>
      <p class="text-blue-200 text-sm mt-1">Powered by Project 2231</p>
    </div>

    <!-- Form area -->
    <div class="px-8 py-8">
      <form id="loginForm" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
          <input type="text" id="username" name="username" required autofocus
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm"
            placeholder="Enter your username">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
          <input type="password" id="password" name="password" required
            class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-slate-800 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-sm"
            placeholder="Enter your password">
        </div>
        <div id="error" class="hidden text-sm text-red-700 bg-red-50 border border-red-200 rounded-lg px-3 py-2.5"></div>
        <button type="submit" id="signin-btn"
          class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-lg transition shadow-sm text-sm">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errEl = document.getElementById('error');
      const btn = document.getElementById('signin-btn');
      errEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value.trim(),
            password: document.getElementById('password').value,
          }),
        });
        if (res.ok) {
          window.location.href = '/';
        } else {
          errEl.textContent = 'Invalid username or password. Please try again.';
          errEl.classList.remove('hidden');
          btn.disabled = false;
          btn.textContent = 'Sign In';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errEl.textContent = 'Connection error. Please check your network and try again.';
        errEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
